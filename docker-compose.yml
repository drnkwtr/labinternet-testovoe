name: "${APP_NAME:-labinternet}"

volumes:
  db: null
  redis: null

networks:
  app:
    driver: bridge

services:
  nginx:
    image: fholzer/nginx-brotli:v1.28.3
    container_name: "${APP_NAME:-labinternet}-nginx"
    volumes:
      - ./.docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./.docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
      - ./:/app
    restart: unless-stopped
    ports:
      - ${APP_PORT:-8080}:80
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app

  db:
    image: postgres:16.2-alpine3.19
    command: |
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c min_wal_size=128MB
        -c max_wal_size=2GB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
    container_name: "${APP_NAME:-labinternet}-db"
    environment:
      - POSTGRES_USER=${DB_USERNAME:-default}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-default}
      - POSTGRES_DB=${DB_DATABASE:-default}
    volumes:
      - db:/var/lib/postgresql/data/
    restart: unless-stopped
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app

  redis:
    image: redis:7.2.4-alpine3.19
    container_name: "${APP_NAME:-labinternet}-redis"
    volumes:
      - redis:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - app

  node:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./:/app
    profiles: ["build"]
    command: sh -c "npm install --no-audit --no-fund && npm run build"

  app:
    build:
      dockerfile: ./Dockerfile
      context: ./
    container_name: "${APP_NAME:-labinternet}-app"
    environment:
      ENV_SUBSTITUTION_ENABLE: true
      PHP_MEMORY_LIMIT: "512M"
      PHP_FPM_LISTEN: 9000
      PHP_SESSION_GC_MAXLIFETIME: 7200
      PHP_FPM_ERROR_LOG: "/proc/self/fd/2"
      PHP_FPM_LOG_LEVEL: error
      PHP_FPM_USER: 1000
      PHP_FPM_GROUP: 1000
      PHP_IDE_CONFIG: "serverName=labinternet"
    volumes:
      - ./:/app
      - ./.docker/app/php-overrides.ini:/usr/local/etc/php/conf.d/zz-overrides.ini
      - ./.docker/app/xdebug.ini:/usr/local/etc/php/conf.d/zz-xdebug.ini
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/docker/healthcheck.sh" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app
